{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ profile.name }} | Portfolio</title>

    <meta name="description" content="{{ profile.title }}">
    <meta name="theme-color" content="#08111f">

    <meta property="og:title" content="{{ profile.name }} | Portfolio">
    <meta property="og:description" content="{{ profile.title }}">
    <meta property="og:type" content="website">

    <link rel="icon" href="{% static 'portfolio/images/profile.jpeg' %}">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: "#08111f",
                        darkSection: "#0b1526",
                        darkCard: "#111c2d",
                        darkCard2: "#162235",
                        accent: "#5eead4",
                        softText: "#cbd8ea",
                        mutedText: "#9fb0c9"
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            overflow-x: hidden;
        }

        @media (min-width: 1024px) {
            html {
                font-size: 17px;
            }
        }

        @media (min-width: 1280px) {
            [class*="max-w-6xl"] {
                max-width: 1400px !important;
            }

            [class*="max-w-5xl"] {
                max-width: 1200px !important;
            }

            [class*="max-w-4xl"] {
                max-width: 1100px !important;
            }

            [class*="w-[92%]"] {
                width: 95% !important;
            }
        }

        .nav-active {
            color: #5eead4 !important;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 8px;
        }
    </style>
</head>

<body class="bg-darkBg text-white antialiased">
    <header class="sticky top-0 z-50 border-b border-white/10 bg-darkBg/95 backdrop-blur-xl">
        <nav class="mx-auto flex min-h-[72px] w-[95%] max-w-[1400px] items-center justify-between">
            <!-- Brand -->
            <a href="#home" class="bg-gradient-to-r from-accent to-cyan-300 bg-clip-text text-xl font-black tracking-wide text-transparent transition hover:from-white hover:to-accent">
           {{ profile.name }}
          </a>

            <!-- Mobile Menu Button -->
            <button id="menuBtn"
                    class="text-2xl text-white md:hidden"
                    aria-label="Toggle navigation">
                ☰
            </button>

            <!-- Navbar Links -->
            <div id="navLinks"
                 class="hidden absolute left-0 right-0 top-[72px] flex-col gap-5 border-b border-white/10 bg-darkBg px-[4%] py-5 text-sm text-softText md:static md:flex md:flex-row md:items-center md:border-0 md:bg-transparent md:p-0">

                <a href="#about"
                   data-section="about"
                   class="nav-link text-softText hover:text-accent">
                    About
                </a>

                <a href="#skills"
                   data-section="skills"
                   class="nav-link text-softText hover:text-accent">
                    Skills
                </a>

                <a href="#education"
                   data-section="education"
                   class="nav-link text-softText hover:text-accent">
                    Education
                </a>

                <a href="#certifications"
                   data-section="certifications"
                   class="nav-link text-softText hover:text-accent">
                    Certifications
                </a>

                <a href="#projects"
                   data-section="projects"
                   class="nav-link text-softText hover:text-accent">
                    Projects
                </a>

                <a href="{{ profile.github }}"
                   target="_blank"
                   rel="noopener"
                   class="text-softText hover:text-accent">
                    GitHub
                </a>

                <a href="#contact"
                   data-section="contact"
                   class="nav-link text-softText hover:text-accent">
                    Contact
                </a>

                <a href="{% static 'portfolio/files/Asiful Alam Sami _Cv.pdf' %}"
                   download
                   class="rounded-lg bg-accent px-5 py-2 font-bold text-darkBg transition hover:-translate-y-0.5 hover:bg-[#7fffee]">
                    Download CV
                </a>
            </div>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="bg-[#050b14] py-7 text-center text-mutedText">
        <div class="mx-auto w-[95%] max-w-[1400px]">
            <p>© {{ profile.name }}. Built with Django & Tailwind CSS.</p>
        </div>
    </footer>

    <script>
        const menuBtn = document.getElementById("menuBtn");
        const navLinks = document.getElementById("navLinks");
        const navItems = document.querySelectorAll(".nav-link");
        const sections = document.querySelectorAll("section[id]");

        function setActiveNav(sectionId) {
            navItems.forEach((item) => {
                const itemSection = item.getAttribute("data-section");

                item.classList.remove("nav-active");

                if (itemSection === sectionId) {
                    item.classList.add("nav-active");
                }
            });
        }

        function updateActiveNavOnScroll() {
            let currentSection = "";

            sections.forEach((section) => {
                const sectionTop = section.offsetTop - 130;
                const sectionHeight = section.offsetHeight;

                if (
                    window.scrollY >= sectionTop &&
                    window.scrollY < sectionTop + sectionHeight
                ) {
                    currentSection = section.getAttribute("id");
                }
            });

            if (currentSection) {
                setActiveNav(currentSection);
            }
        }

        if (menuBtn && navLinks) {
            menuBtn.addEventListener("click", () => {
                navLinks.classList.toggle("hidden");
                navLinks.classList.toggle("flex");
            });

            navLinks.querySelectorAll("a").forEach((link) => {
                link.addEventListener("click", () => {
                    if (window.innerWidth < 768) {
                        navLinks.classList.add("hidden");
                        navLinks.classList.remove("flex");
                    }
                });
            });
        }

        navItems.forEach((item) => {
            item.addEventListener("click", () => {
                const sectionId = item.getAttribute("data-section");
                setActiveNav(sectionId);
            });
        });

        window.addEventListener("scroll", updateActiveNavOnScroll);
        window.addEventListener("load", updateActiveNavOnScroll);
    </script>
</body>
</html>
